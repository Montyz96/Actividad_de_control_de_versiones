<!DOCTYPE html>
<html lang="es">
<head>

    <title>Mi Primer Hola Mundo</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;

        h1 {
            color: #007acc;
            margin: 0 0 10px 0;

        p {
            color: #555;
            font-size: 1.1rem;
            margin: 0;

    <div class="container">
        <h1>Hola Mundo - Versión 2</h1>
        <p>Este es mi segundo cambio.</p>
